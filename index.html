<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Akıllı Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; --rx: #ff4d4d; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .logo { font-size: 22px; font-weight: bold; color: var(--gold); text-align: center; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { font-size: 10px; color: #888; text-align: center; margin-bottom: 20px; letter-spacing: 4px; }
        .eye-section { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .eye-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        label { font-size: 11px; color: #777; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #111; color: #fff; font-size: 14px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: var(--gold); }
        .btn { background: var(--gold); color: #000; padding: 16px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px solid var(--gold); border-radius: 10px; background: rgba(212, 175, 55, 0.05); text-align: left; }
        .rx-badge { background: var(--rx); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ATLANTİS ELEGANCE OPTİK</div>
        <div class="subtitle">AI & TECHNOLOGY SYSTEMS</div>
        
        <label>Cam Markası & Kaplama:</label>
        <select id="brand" style="margin-bottom:15px;">
            <option value="Zeiss - BlueGuard">Zeiss (BlueGuard - Mavi Işık Koruma)</option>
            <option value="Seiko - SRC">Seiko (SRC Premium Kaplama)</option>
            <option value="Hoya - Hi-Vision">Hoya (Hi-Vision Long Life)</option>
            <option value="Novax - Pixar">Novax (Pixar Digital)</option>
        </select>

        <div class="eye-section">
            <span class="eye-title">SAĞ GÖZ (OD)</span>
            <div class="grid">
                <div><label>SPH</label><input type="text" id="r_sph" placeholder="0.00"></div>
                <div><label>CYL</label><input type="text" id="r_cyl" placeholder="0.00"></div>
                <div><label>AKS</label><input type="number" id="r_aks" placeholder="0"></div>
            </div>
        </div>

        <div class="eye-section">
            <span class="eye-title">SOL GÖZ (OS)</span>
            <div class="grid">
                <div><label>SPH</label><input type="text" id="l_sph" placeholder="0.00"></div>
                <div><label>CYL</label><input type="text" id="l_cyl" placeholder="0.00"></div>
                <div><label>AKS</label><input type="number" id="l_aks" placeholder="0"></div>
            </div>
        </div>

        <button class="btn" onclick="analyze()">ANALİZ ET</button>

        <div id="result" class="result-box">
            <div id="rx_status"></div>
            <h4 style="margin:0 0 10px 0; color:var(--gold);">ZENITH TEKNİK RAPOR</h4>
            <p id="report-text" style="font-size:13px; line-height:1.6; margin:0;"></p>
            <button class="btn" style="background:#25d366; color:#fff; margin-top:20px;" onclick="sendToWhatsApp()">WHATSAPP İLE SİPARİŞİ BAŞLAT</button>
        </div>
    </div>

    <script>
        function analyze() {
            let rs = parseFloat(document.getElementById('r_sph').value) || 0;
            let rc = parseFloat(document.getElementById('r_cyl').value) || 0;
            let ls = parseFloat(document.getElementById('l_sph').value) || 0;
            let lc = parseFloat(document.getElementById('l_cyl').value) || 0;
            
            let maxSph = Math.max(Math.abs(rs), Math.abs(ls));
            let maxCyl = Math.max(Math.abs(rc), Math.abs(lc));
            
            let isRX = (maxCyl > 2.00) ? true : false;
            let index = "";
            let percent = "";

            if (maxSph <= 2.25) { index = "1.56"; percent = "%30"; }
            else if (maxSph > 2.25 && maxSph <= 4.00) { index = "1.61"; percent = "%45"; }
            else if (maxSph > 4.00 && maxSph <= 6.00) { index = "1.67"; percent = "%60"; }
            else { index = "1.74"; percent = "%75"; }

            let statusHTML = isRX ? '<span class="rx-badge">⚠️ RX (ÖZEL ÜRETİM) GEREKLİ</span>' : '<span class="rx-badge" style="background:green;">✓ STANDART STOK UYGUN</span>';
            document.getElementById('rx_status').innerHTML = statusHTML;
            
            let report = `<b>Önerilen İndis:</b> ${index}<br>` +
                         `<b>İnceltme Oranı:</b> ${percent}<br>` +
                         `<b>Durum:</b> ${isRX ? 'Yüksek astigmat nedeniyle kişiye özel üretim yapılması önerilir.' : 'Numaralarınız stok cam sınırları içerisindedir.'}<br>` +
                         `<b>Zenith Notu:</b> Zenith Robotik ölçüm ile odaklama hatası sıfıra indirilecektir.`;
            
            document.getElementById('report-text').innerHTML = report;
            document.getElementById('result').style.display = 'block';
        }

        function sendToWhatsApp() {
            let brand = document.getElementById('brand').value;
            let msg = `*ATLANTİS ELEGANCE OPTİK - ANALİZ*%0A%0A` +
                      `*Cam:* ${brand}%0A` +
                      `*SAĞ:* SPH ${document.getElementById('r_sph').value} / CYL ${document.getElementById('r_cyl').value} / AKS ${document.getElementById('r_aks').value}%0A` +
                      `*SOL:* SPH ${document.getElementById('l_sph').value} / CYL ${document.getElementById('l_cyl').value} / AKS ${document.getElementById('l_aks').value}%0A%0A` +
                      `Zenith Robotik ölçüm ve özel fiyat teklifi bekliyorum.`;
            window.location.href = `https://wa.me/905326470159?text=${msg}`;
        }
    </script>
</body>
</html>
