<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Uzman Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; --red: #ff4d4d; }
        body { background-color: var(--black); color: #fff; font-family: 'Inter', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .logo { font-size: 20px; font-weight: bold; color: var(--gold); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* İki Kutu Seçimi */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-card { border: 1px solid #333; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #000; }
        .cat-card.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .cat-card h4 { margin: 0 0 5px 0; font-size: 14px; color: var(--gold); }
        .cat-card p { margin: 0; font-size: 10px; color: #888; }

        .form-section { display: none; background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .eye-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 14px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px; background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ATLANTİS ELEGANCE OPTİK</div>

        <div class="category-grid">
            <div class="cat-card" id="btn-stok" onclick="selectCat('Stok')">
                <h4>STOK CAMLAR</h4>
                <p>Ekonomik & Hızlı</p>
            </div>
            <div class="cat-card" id="btn-rx" onclick="selectCat('RX')">
                <h4>KİŞİYE ÖZEL (RX)</h4>
                <p>Premium & Hassas</p>
            </div>
        </div>

        <div id="main-form" class="form-section">
            <label id="brand-label">Cam Markası Seçin:</label>
            <select id="brand" style="margin-bottom:15px;"></select>

            <span style="color:var(--gold); font-weight:bold; font-size:12px;">SAĞ GÖZ (R)</span>
            <div class="eye-grid">
                <div><label>SPH</label><input type="text" id="r_sph" placeholder="0.00"></div>
                <div><label>CYL</label><input type="text" id="r_cyl" placeholder="0.00"></div>
                <div><label>AKS</label><input type="number" id="r_aks" placeholder="0"></div>
            </div>

            <div style="height:15px;"></div>

            <span style="color:var(--gold); font-weight:bold; font-size:12px;">SOL GÖZ (L)</span>
            <div class="eye-grid">
                <div><label>SPH</label><input type="text" id="l_sph" placeholder="0.00"></div>
                <div><label>CYL</label><input type="text" id="l_cyl" placeholder="0.00"></div>
                <div><label>AKS</label><input type="number" id="l_aks" placeholder="0"></div>
            </div>

            <button class="btn" onclick="analyze()">ANALİZ ET</button>
        </div>

        <div id="result" class="result-box">
            <h4 style="margin:0; color:var(--gold);">ZENITH ANALİZ SONUCU</h4>
            <p id="report-text" style="font-size:13px; line-height:1.6;"></p>
            <button class="btn" style="background:#25d366; color:#fff;" onclick="sendToWhatsApp()">WHATSAPP'A GÖNDER</button>
        </div>
    </div>

    <script>
        let selectedType = "";

        function selectCat(type) {
            selectedType = type;
            document.getElementById('btn-stok').classList.remove('active');
            document.getElementById('btn-rx').classList.remove('active');
            document.getElementById('btn-' + type.toLowerCase()).classList.add('active');
            
            let brandSelect = document.getElementById('brand');
            brandSelect.innerHTML = "";
            
            let brands = type === 'Stok' 
                ? ["Ekonomik Stok Cam", "Mavi Işık Korumalı Stok"] 
                : ["Zeiss RX Special", "Seiko Kişiye Özel", "Hoya Premium RX", "Novax Freeform"];
            
            brands.forEach(b => {
                let opt = document.createElement("option");
                opt.value = b; opt.innerText = b;
                brandSelect.appendChild(opt);
            });

            document.getElementById('main-form').style.display = 'block';
            document.getElementById('result').style.display = 'none';
        }

        function analyze() {
            let rs = Math.abs(parseFloat(document.getElementById('r_sph').value) || 0);
            let rc = Math.abs(parseFloat(document.getElementById('r_cyl').value) || 0);
            let ls = Math.abs(parseFloat(document.getElementById('l_sph').value) || 0);
            let lc = Math.abs(parseFloat(document.getElementById('l_cyl').value) || 0);
            
            let maxVal = Math.max(rs, ls, rc, lc);
            let index = "1.56 (%30 İnce)";
            let note = "Standart numaralar.";

            // Senin inceltme kuralların (CYL hassasiyeti eklendi)
            if (maxVal > 2.00 || rc > 2.00 || lc > 2.00) { index = "1.67 (%60 İnce)"; note = "Yüksek astigmat/numara nedeniyle yüksek inceltme şart."; }
            if (maxVal > 4.00 || rc > 3.00 || lc > 3.00) { index = "1.74 (%75 İnce)"; note = "Maksimum estetik için en ince cam teknolojisi."; }
            if (maxVal <= 2.00 && rc <= 2.00 && lc <= 2.00) { index = "1.56 (%30 İnce)"; note = "Numaralarınız ekonomik seri için uygun."; }

            document.getElementById('report-text').innerHTML = `<b>Kategori:</b> ${selectedType}<br><b>Önerilen:</b> ${index}<br><b>Uzman Notu:</b> ${note}`;
            document.getElementById('result').style.display = 'block';
        }

        function sendToWhatsApp() {
            let msg = `*ATLANTİS ELEGANCE OPTİK*%0A%0A` +
                      `*Kategori:* ${selectedType}%0A` +
                      `*Marka:* ${document.getElementById('brand').value}%0A` +
                      `*SAĞ:* ${document.getElementById('r_sph').value} / ${document.getElementById('r_cyl').value} / ${document.getElementById('r_aks').value}%0A` +
                      `*SOL:* ${document.getElementById('l_sph').value} / ${document.getElementById('l_cyl').value} / ${document.getElementById('l_aks').value}%0A%0A` +
                      `Zenith Robotik ölçüm randevusu istiyorum.`;
            window.location.href = `https://wa.me/905326470159?text=${msg}`;
        }
    </script>
</body>
</html>
