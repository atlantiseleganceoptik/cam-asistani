<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance - Akıllı Cam Analizi</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; }
        body { background-color: var(--black); color: #fff; font-family: 'Inter', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: var(--gray); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px; }
        .step-title { font-size: 16px; margin-bottom: 20px; color: #ccc; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px; background: rgba(212, 175, 55, 0.1); }
        .zenith-tag { font-size: 11px; color: #00ffcc; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ATLANTİS ELEGANCE</div>
        <div class="step-title">Akıllı Cam Analiz Formu</div>

        <label>Cam Markası Tercihiniz:</label>
        <select id="brand">
            <option value="Zeiss">Zeiss (Alman Teknolojisi)</option>
            <option value="Seiko">Seiko (Japon Hassasiyeti)</option>
            <option value="Hoya">Hoya (Premium Konfor)</option>
            <option value="Novax">Novax (Yerli & Global Başarı)</option>
        </select>

        <label>Göz Dereceniz (Sferik):</label>
        <input type="number" id="sph" step="0.25" placeholder="Örn: 2.50" required>

        <label>Kullanım Amacı:</label>
        <select id="usage">
            <option value="Uzak">Uzak (Günlük kullanım)</option>
            <option value="Yakın">Yakın (Okuma)</option>
            <option value="Progressive">Progressive (Uzak-Yakın bir arada)</option>
            <option value="Digital">Digital/Ofis (Ekran kullanımı)</option>
        </select>

        <button class="btn" onclick="analyze()">ANALİZİ TAMAMLA</button>

        <div id="result" class="result-box">
            <h4 style="margin:0; color:var(--gold);">ÖN RAPORUNUZ HAZIR</h4>
            <p id="report-text" style="font-size:13px;"></p>
            <button class="btn" style="background:#25d366; color:#fff;" onclick="sendToWhatsApp()">TEKLİF AL & WHATSAPP'A GÖNDER</button>
        </div>
        
        <span class="zenith-tag">✨ Zenith Robotik Ölçüm Uyumludur</span>
    </div>

    <script>
        function analyze() {
            let sph = Math.abs(document.getElementById('sph').value);
            let report = "";
            let index = "";

            if (sph <= 2) { report = "Standart inceltme yeterlidir."; index = "1.50 - 1.56"; }
            else if (sph > 2 && sph <= 4) { report = "Estetik görünüm için %35 inceltilmiş cam önerilir."; index = "1.60 Index"; }
            else { report = "Yüksek konfor için %50-60 süper inceltilmiş cam önerilir."; index = "1.67 - 1.74 Index"; }

            document.getElementById('report-text').innerText = "Derecenize göre önerilen: " + index + "\n" + report;
            document.getElementById('result').style.display = 'block';
        }

        function sendToWhatsApp() {
            let brand = document.getElementById('brand').value;
            let sph = document.getElementById('sph').value;
            let usage = document.getElementById('usage').value;
            let report = document.getElementById('report-text').innerText;
            
            let message = `*ATLANTİS ELEGANCE - CAM ANALİZ TALEBİ*%0A%0A` +
                          `*Marka:* ${brand}%0A` +
                          `*Derece:* ${sph}%0A` +
                          `*Kullanım:* ${usage}%0A` +
                          `*Öneri:* ${report}%0A%0A` +
                          `Zenith robot ölçümü ve kampanya hakkında bilgi istiyorum.`;
            
            window.location.href = `https://wa.me/905326470159?text=${message}`;
        }
    </script>
</body>
</html>
