<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Profesyonel Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --cyan: #00f2ff; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 22px; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 9px; color: #666; letter-spacing: 4px; margin-top: 5px; }

        /* Ana Seçenekler */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 18px 5px; cursor: pointer; text-align: center; }
        .card.active-card { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .card h3 { margin: 0; color: var(--gold); font-size: 13px; }

        /* Giriş Alanları - Yaşlı Dostu Büyük Butonlar */
        .input-row { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .input-label { font-size: 13px; color: var(--gold); font-weight: bold; width: 45px; }
        .step-btn { width: 45px; height: 45px; border-radius: 10px; border: 2px solid var(--gold); background: transparent; color: var(--gold); font-size: 24px; cursor: pointer; font-weight: bold; }
        .step-btn:active { background: var(--gold); color: #000; }
        .num-display { font-size: 20px; font-weight: bold; width: 85px; text-align: center; color: #fff; }

        /* Aks Bölümü - Sadece Büyük Buton */
        .aks-row { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 12px; border-radius: 12px; border: 1px dashed #444; margin-bottom: 15px; }
        
        #form-area { display: none; background: var(--gray); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 10px; }
        select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 20px; font-size: 16px; }
        .btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 16px; text-transform: uppercase; }
        
        .result-box { display: none; margin-top: 25px; padding: 20px; border: 1px solid var(--gold); border-radius: 15px; background: rgba(212, 175, 55, 0.05); }
        .robot-badge { margin-top: 15px; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan); color: var(--cyan); font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ATLANTİS ELEGANCE OPTİK</h1>
        <div class="subtitle">AI & TECHNOLOGY SYSTEMS</div>
    </div>

    <div class="card-grid">
        <div class="card" id="card-stok" onclick="openForm('Stok')"><h3>📦 STOK</h3></div>
        <div class="card" id="card-rx" onclick="openForm('RX')"><h3>💎 ÖZEL RX</h3></div>
        <div class="card" id="card-prog" onclick="openForm('Progressive')"><h3>👓 UZAK-YAKIN</h3></div>
        <div class="card" id="card-miyo" onclick="openForm('MiyoSmart')"><h3>🛡️ MIYOSMART</h3></div>
    </div>

    <div id="form-area">
        <h4 id="form-title" style="color:var(--gold); margin-bottom:15px; text-align:center;">Veri Girişi</h4>
        
        <label style="font-size:11px; color:#888;">Marka Tercihi:</label>
        <select id="brand"></select>

        <p style="color:var(--gold); font-size:12px; margin-bottom:10px; font-weight:bold; text-align:center; border-bottom: 1px solid #333; padding-bottom:5px;">SAĞ GÖZ (R)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('r_sph', -0.25)">-</button><div id="r_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('r_cyl', -0.25)">-</button><div id="r_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_cyl', 0.25)">+</button></div>
        <div class="aks-row"><span class="input-label">AKS</span><button class="step-btn" onclick="stepAks('r_aks', -5)">-</button><div id="r_aks_val" class="num-display">0°</div><button class="step-btn" onclick="stepAks('r_aks', 5)">+</button></div>

        <p style="color:var(--gold); font-size:12px; margin:20px 0 10px 0; font-weight:bold; text-align:center; border-bottom: 1px solid #333; padding-bottom:5px;">SOL GÖZ (L)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('l_sph', -0.25)">-</button><div id="l_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('l_cyl', -0.25)">-</button><div id="l_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_cyl', 0.25)">+</button></div>
        <div class="aks-row"><span class="input-label">AKS</span><button class="step-btn" onclick="stepAks('l_aks', -5)">-</button><div id="l_aks_val" class="num-display">0°</div><button class="step-btn" onclick="stepAks('l_aks', 5)">+</button></div>

        <button class="btn" onclick="runAnalysis()">TEKNOLOJİK ANALİZİ GÖR</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    let values = { r_sph: 0, r_cyl: 0, r_aks: 0, l_sph: 0, l_cyl: 0, l_aks: 0 };
    let mode = "";

    function step(id, amount) {
        values[id] += amount;
        let d = values[id].toFixed(2);
        document.getElementById(id + '_val').innerText = (values[id] > 0 ? "+" : "") + d;
    }

    function stepAks(id, amount) {
        values[id] = (values[id] + amount + 180) % 185; 
        if (values[id] > 180) values[id] = 0;
        document.getElementById(id + '_val').innerText = values[id] + "°";
    }

    function openForm(type) {
        mode = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
        document.getElementById('card-' + (type==='Progressive'?'prog':type==='MiyoSmart'?'miyo':type.toLowerCase())).classList.add('active-card');
        document.getElementById('form-area').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        
        let brands = document.getElementById('brand');
        brands.innerHTML = "";
        let list = (type === 'MiyoSmart') ? ["Hoya MiyoSmart"] : ["Zeiss Premium", "Seiko Optical", "Hoya Vision", "Novax Freeform"];
        list.forEach(b => { let o = document.createElement("option"); o.value = o.innerText = b; brands.appendChild(o); });
        
        window.scrollTo({top: document.getElementById('form-area').offsetTop - 10, behavior: 'smooth'});
    }

    function runAnalysis() {
        let max = Math.max(Math.abs(values.r_sph), Math.abs(values.r_cyl), Math.abs(values.l_sph), Math.abs(values.l_cyl));
        let res = document.getElementById('result');
        let html = `<h4 style="margin:0; color:var(--gold); text-align:center;">ZENITH TEKNİK RAPORU</h4>`;

        if (mode === 'MiyoSmart') {
            html += `<p style="font-size:13px; text-align:center; margin-top:10px;"><b>MiyoSmart Tedavi Camı:</b> DIMS teknolojisi ile miyopi kontrolü.</p>`;
        } else if (mode === 'Progressive') {
            html += `<p style="font-size:13px; text-align:center; margin-top:10px;"><b>Progressive Tasarım:</b> Uzak ve yakın tek camda, Zenith milimetrik odaklama ile en yüksek konfor.</p>`;
        } else {
            let ince = max <= 2.25 ? "%30" : max <= 3.25 ? "%45" : "%60 ve üzeri";
            html += `<p style="font-size:13px; text-align:center; margin-top:10px;">Verilerinize göre <b>${ince} inceltilmiş</b> cam teknolojisi uygundur.</p>`;
        }

        html += `<div class="robot-badge">
                    <b>🤖 ZENITH ROBOTİK ODAK NOKTASI</b><br>
                    Sıfır hata odaklama ve dijital taranmış hassasiyetle üretime alınacaktır.
                 </div>`;

        html += `<button class="btn" style="background:#25d366; color:#fff;" onclick="send()">WHATSAPP RANDEVU AL</button>`;
        res.innerHTML = html;
        res.style.display = 'block';
        setTimeout(() => { res.scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    function send() {
        let msg = `*ATLANTİS ELEGANCE OPTİK*%0A%0A` +
                  `*Kategori:* ${mode}%0A` +
                  `*Marka:* ${document.getElementById('brand').value}%0A` +
                  `*SAĞ:* ${document.getElementById('r_sph_val').innerText} / ${document.getElementById('r_cyl_val').innerText} Aks: ${values.r_aks}%0A` +
                  `*SOL:* ${document.getElementById('l_sph_val').innerText} / ${document.getElementById('l_cyl_val').innerText} Aks: ${values.l_aks}%0A%0A` +
                  `Zenith Robotik sıfır hata odaklama randevusu istiyorum.`;
        window.location.href = `https://wa.me/905326470159?text=${msg}`;
    }
</script>

</body>
</html>
