<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Profesyonel Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --cyan: #00f2ff; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 10px; color: #666; letter-spacing: 4px; margin-top: 5px; }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px 5px; cursor: pointer; text-align: center; transition: 0.3s; }
        .card.active-card { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .card h3 { margin: 0; color: var(--gold); font-size: 13px; }

        /* Numara Giriş Satırı */
        .input-row { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid #222; }
        .input-label { font-size: 12px; color: var(--gold); font-weight: bold; width: 35px; }
        .step-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-size: 18px; cursor: pointer; }
        .num-display { font-size: 16px; font-weight: bold; width: 70px; text-align: center; color: #fff; }

        /* Yeni Sade Aks Alanı */
        .aks-box { background: #000; padding: 12px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        .aks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .aks-title { font-size: 11px; color: #888; }
        .aks-val { color: var(--gold); font-weight: bold; font-size: 14px; }
        .aks-slider { width: 100%; height: 8px; border-radius: 5px; background: #333; outline: none; -webkit-appearance: none; margin: 10px 0; }
        .aks-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid #fff; }

        #form-area { display: none; background: var(--gray); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 10px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; }
        .btn { background: var(--gold); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 15px; }
        
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px solid var(--gold); border-radius: 12px; background: rgba(212, 175, 55, 0.05); }
        .robot-badge { margin-top: 15px; padding: 12px; border-radius: 8px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan); color: var(--cyan); font-size: 11px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ATLANTİS ELEGANCE OPTİK</h1>
        <div class="subtitle">AI & TECHNOLOGY SYSTEMS</div>
    </div>

    <div class="card-grid">
        <div class="card" id="card-stok" onclick="openForm('Stok')"><h3>📦 STOK</h3></div>
        <div class="card" id="card-rx" onclick="openForm('RX')"><h3>💎 ÖZEL RX</h3></div>
        <div class="card" id="card-prog" onclick="openForm('Progressive')"><h3>👓 UZAK-YAKIN</h3></div>
        <div class="card" id="card-miyo" onclick="openForm('MiyoSmart')"><h3>🛡️ MIYOSMART</h3></div>
    </div>

    <div id="form-area">
        <h4 id="form-title" style="color:var(--gold); margin-bottom:15px; text-align:center;">Veri Girişi</h4>
        
        <select id="brand"></select>

        <p style="color:var(--gold); font-size:11px; margin-bottom:8px; font-weight:bold;">SAĞ GÖZ (R)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('r_sph', -0.25)">-</button><div id="r_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('r_cyl', -0.25)">-</button><div id="r_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_cyl', 0.25)">+</button></div>
        
        <div class="aks-box">
            <div class="aks-header"><span class="aks-title">AKS (Eksen)</span><span class="aks-val" id="r_aks_text">0°</span></div>
            <input type="range" min="0" max="180" value="0" class="aks-slider" id="r_aks" oninput="updateAks('r_aks')">
        </div>

        <p style="color:var(--gold); font-size:11px; margin:15px 0 8px 0; font-weight:bold;">SOL GÖZ (L)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('l_sph', -0.25)">-</button><div id="l_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('l_cyl', -0.25)">-</button><div id="l_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_cyl', 0.25)">+</button></div>
        
        <div class="aks-box">
            <div class="aks-header"><span class="aks-title">AKS (Eksen)</span><span class="aks-val" id="l_aks_text">0°</span></div>
            <input type="range" min="0" max="180" value="0" class="aks-slider" id="l_aks" oninput="updateAks('l_aks')">
        </div>

        <button class="btn" onclick="runAnalysis()">TEKNOLOJİK ANALİZİ GÖR</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    let values = { r_sph: 0, r_cyl: 0, l_sph: 0, l_cyl: 0 };
    let mode = "";

    function step(id, amount) {
        values[id] += amount;
        let d = values[id].toFixed(2);
        document.getElementById(id + '_val').innerText = (values[id] > 0 ? "+" : "") + d;
    }

    function updateAks(id) {
        let val = document.getElementById(id).value;
        document.getElementById(id + '_text').innerText = val + "°";
    }

    function openForm(type) {
        mode = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
        document.getElementById('card-' + (type==='Progressive'?'prog':type==='MiyoSmart'?'miyo':type.toLowerCase())).classList.add('active-card');
        document.getElementById('form-area').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        
        let brands = document.getElementById('brand');
        brands.innerHTML = "";
        let list = (type === 'MiyoSmart') ? ["Hoya MiyoSmart"] : ["Novax Freeform", "Zeiss Premium", "Seiko Optical", "Hoya Vision"];
        list.forEach(b => { let o = document.createElement("option"); o.value = o.innerText = b; brands.appendChild(o); });
        
        window.scrollTo({top: document.getElementById('form-area').offsetTop - 10, behavior: 'smooth'});
    }

    function runAnalysis() {
        let max = Math.max(Math.abs(values.r_sph), Math.abs(values.r_cyl), Math.abs(values.l_sph), Math.abs(values.l_cyl));
        let res = document.getElementById('result');
        let html = `<h4 style="margin:0; color:var(--gold); text-align:center;">ZENITH TEKNİK RAPORU</h4>`;

        if (mode === 'MiyoSmart') {
            html += `<p style="font-size:12px; text-align:center; margin-top:10px;">DIMS Teknolojisi ile miyopi ilerlemesini yavaşlatan özel tasarım.</p>`;
        } else {
            let ince = max <= 2.25 ? "%30" : max <= 3.25 ? "%45" : "%60 ve üzeri";
            html += `<p style="font-size:12px; text-align:center; margin-top:10px;">Göz verileriniz için <b>${ince} inceltilmiş</b> cam teknolojisi uygundur.</p>`;
        }

        html += `<div class="robot-badge">
                    <b>🤖 ZENITH ROBOTİK ODAK NOKTASI</b><br>
                    Sıfır hata odaklama ve milimetrik dijital taranmış hassasiyetle üretime alınacaktır.
                 </div>`;

        html += `<button class="btn" style="background:#25d366; color:#fff;" onclick="send()">WHATSAPP RANDEVU AL</button>`;
        res.innerHTML = html;
        res.style.display = 'block';
        setTimeout(() => { res.scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    function send() {
        let r_aks = document.getElementById('r_aks').value;
        let l_aks = document.getElementById('l_aks').value;
        let msg = `*ATLANTİS ELEGANCE OPTİK*%0A%0A` +
                  `*Kategori:* ${mode}%0A` +
                  `*Marka:* ${document.getElementById('brand').value}%0A` +
                  `*SAĞ:* ${document.getElementById('r_sph_val').innerText} / ${document.getElementById('r_cyl_val').innerText} Ax: ${r_aks}%0A` +
                  `*SOL:* ${document.getElementById('l_sph_val').innerText} / ${document.getElementById('l_cyl_val').innerText} Ax: ${l_aks}%0A%0A` +
                  `Zenith Robotik sıfır hata odaklama randevusu istiyorum.`;
        window.location.href = `https://wa.me/905326470159?text=${msg}`;
    }
</script>

</body>
</html>
