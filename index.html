<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Profesyonel Cam Analizi</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; }
        body { background-color: var(--black); color: #fff; font-family: 'Inter', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 20px; font-weight: bold; color: var(--gold); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .eye-section { background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .eye-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 14px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px; background: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ATLANTİS ELEGANCE OPTİK</div>
        
        <label>Cam Markası:</label>
        <select id="brand" style="margin-bottom:15px;">
            <option value="Zeiss">Zeiss</option>
            <option value="Seiko">Seiko</option>
            <option value="Hoya">Hoya</option>
            <option value="Novax">Novax</option>
        </select>

        <div class="eye-section">
            <span class="eye-title">SAĞ GÖZ (R)</span>
            <div class="grid">
                <div>
                    <label>SPH</label>
                    <input type="text" id="r_sph" placeholder="+/- 0.00">
                </div>
                <div>
                    <label>CYL</label>
                    <input type="text" id="r_cyl" placeholder="0.00">
                </div>
                <div>
                    <label>AKS</label>
                    <input type="number" id="r_aks" placeholder="0°">
                </div>
            </div>
        </div>

        <div class="eye-section">
            <span class="eye-title">SOL GÖZ (L)</span>
            <div class="grid">
                <div>
                    <label>SPH</label>
                    <input type="text" id="l_sph" placeholder="+/- 0.00">
                </div>
                <div>
                    <label>CYL</label>
                    <input type="text" id="l_cyl" placeholder="0.00">
                </div>
                <div>
                    <label>AKS</label>
                    <input type="number" id="l_aks" placeholder="0°">
                </div>
            </div>
        </div>

        <button class="btn" onclick="analyze()">TEKNİK ANALİZİ YAP</button>

        <div id="result" class="result-box">
            <h4 style="margin:0; color:var(--gold);">ZENITH ÖN ANALİZ RAPORU</h4>
            <p id="report-text" style="font-size:13px; line-height:1.5;"></p>
            <button class="btn" style="background:#25d366; color:#fff;" onclick="sendToWhatsApp()">WHATSAPP İLE REÇETEYİ GÖNDER</button>
        </div>
    </div>

    <script>
        function analyze() {
            let rs = parseFloat(document.getElementById('r_sph').value) || 0;
            let ls = parseFloat(document.getElementById('l_sph').value) || 0;
            let maxDeg = Math.max(Math.abs(rs), Math.abs(ls));
            let index = "1.50 Standart";
            let advice = "Göz numaranız standart camlar için uygundur.";

            if (maxDeg > 2 && maxDeg <= 4) { index = "1.60 (%35 İnce)"; advice = "Estetik ve hafiflik için %35 inceltilmiş cam önerilir."; }
            else if (maxDeg > 4 && maxDeg <= 6) { index = "1.67 (%45 İnce)"; advice = "Yüksek numara nedeniyle %45 süper inceltme konfor sağlar."; }
            else if (maxDeg > 6) { index = "1.74 (%60 En İnce)"; advice = "Maksimum estetik için dünyanın en ince cam teknolojisi önerilir."; }

            document.getElementById('report-text').innerHTML = `<b>Önerilen İndis:</b> ${index}<br><b>Not:</b> ${advice}`;
            document.getElementById('result').style.display = 'block';
        }

        function sendToWhatsApp() {
            let msg = `*ATLANTİS ELEGANCE OPTİK REÇETE ANALİZİ*%0A%0A` +
                      `*Marka:* ${document.getElementById('brand').value}%0A` +
                      `*SAĞ:* SPH ${document.getElementById('r_sph').value} / CYL ${document.getElementById('r_cyl').value} / AKS ${document.getElementById('r_aks').value}%0A` +
                      `*SOL:* SPH ${document.getElementById('l_sph').value} / CYL ${document.getElementById('l_cyl').value} / AKS ${document.getElementById('l_aks').value}%0A%0A` +
                      `Zenith AI ölçümü için randevu ve fiyat teklifi rica ediyorum.`;
            window.location.href = `https://wa.me/905326470159?text=${msg}`;
        }
    </script>
</body>
</html>
