<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Profesyonel Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --cyan: #00f2ff; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 10px; color: #666; letter-spacing: 4px; margin-top: 5px; }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #333; border-radius: 15px; padding: 20px 10px; 
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .card.active-card { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.15); }
        .card h3 { margin: 0; color: var(--gold); font-size: 14px; }

        .input-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        .input-label { font-size: 12px; color: var(--gold); font-weight: bold; width: 40px; }
        .step-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-size: 18px; cursor: pointer; }
        .num-display { font-size: 16px; font-weight: bold; width: 70px; text-align: center; color: #fff; }

        /* Aks Özel Alanı */
        .aks-row { background: #000; padding: 10px; border-radius: 12px; border: 1px dashed #444; margin-bottom: 15px; text-align: center; }
        .aks-btns { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .aks-btn-small { padding: 5px 10px; font-size: 11px; background: #222; border: 1px solid #444; color: #aaa; border-radius: 5px; }

        #form-area { display: none; background: var(--gray); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 10px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; font-size: 14px; }
        .btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; font-size: 16px; }
        
        .result-box { display: none; margin-top: 25px; padding: 20px; border: 1px solid var(--gold); border-radius: 15px; background: rgba(212, 175, 55, 0.05); }
        .robot-badge { margin-top: 15px; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan); color: var(--cyan); font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ATLANTİS ELEGANCE OPTİK</h1>
        <div class="subtitle">AI & TECHNOLOGY SYSTEMS</div>
    </div>

    <div class="card-grid">
        <div class="card" id="card-stok" onclick="openForm('Stok')"><h3>📦 STOK</h3></div>
        <div class="card" id="card-rx" onclick="openForm('RX')"><h3>💎 ÖZEL RX</h3></div>
        <div class="card" id="card-prog" onclick="openForm('Progressive')"><h3>👓 UZAK-YAKIN</h3></div>
        <div class="card" id="card-miyo" onclick="openForm('MiyoSmart')"><h3>🛡️ MIYOSMART</h3></div>
    </div>

    <div id="form-area">
        <h4 id="form-title" style="color:var(--gold); margin-bottom:15px; text-align:center;">Analiz Başlıyor</h4>
        
        <label style="font-size:10px; color:#666;">Tercih Edilen Teknoloji:</label>
        <select id="brand"></select>

        <p style="color:var(--gold); font-size:11px; margin-bottom:8px; font-weight:bold;">SAĞ GÖZ (R)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('r_sph', -0.25)">-</button><div id="r_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('r_cyl', -0.25)">-</button><div id="r_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('r_cyl', 0.25)">+</button></div>
        <div class="aks-row">
            <span style="font-size:11px; color:#888;">AKS (Eksen): <b id="r_aks_val" style="color:#fff;">0</b>°</span>
            <div class="aks-btns">
                <button class="aks-btn-small" onclick="stepAks('r_aks', -5)">-5°</button>
                <button class="aks-btn-small" onclick="stepAks('r_aks', -1)">-1°</button>
                <button class="aks-btn-small" onclick="stepAks('r_aks', 1)">+1°</button>
                <button class="aks-btn-small" onclick="stepAks('r_aks', 5)">+5°</button>
            </div>
        </div>

        <p style="color:var(--gold); font-size:11px; margin:15px 0 8px 0; font-weight:bold;">SOL GÖZ (L)</p>
        <div class="input-row"><span class="input-label">SPH</span><button class="step-btn" onclick="step('l_sph', -0.25)">-</button><div id="l_sph_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_sph', 0.25)">+</button></div>
        <div class="input-row"><span class="input-label">CYL</span><button class="step-btn" onclick="step('l_cyl', -0.25)">-</button><div id="l_cyl_val" class="num-display">0.00</div><button class="step-btn" onclick="step('l_cyl', 0.25)">+</button></div>
        <div class="aks-row">
            <span style="font-size:11px; color:#888;">AKS (Eksen): <b id="l_aks_val" style="color:#fff;">0</b>°</span>
            <div class="aks-btns">
                <button class="aks-btn-small" onclick="stepAks('l_aks', -5)">-5°</button>
                <button class="aks-btn-small" onclick="stepAks('l_aks', -1)">-1°</button>
                <button class="aks-btn-small" onclick="stepAks('l_aks', 1)">+1°</button>
                <button class="aks-btn-small" onclick="stepAks('l_aks', 5)">+5°</button>
            </div>
        </div>

        <button class="btn" onclick="runAnalysis()">TEKNOLOJİK ANALİZİ GÖR</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    let values = { r_sph: 0, r_cyl: 0, r_aks: 0, l_sph: 0, l_cyl: 0, l_aks: 0 };
    let mode = "";

    function step(id, amount) {
        values[id] += amount;
        let d = values[id].toFixed(2);
        document.getElementById(id + '_val').innerText = (values[id] > 0 ? "+" : "") + d;
    }

    function stepAks(id, amount) {
        values[id] = (values[id] + amount + 180) % 181; // 0-180 arası tutar
        document.getElementById(id + '_val').innerText = values[id];
    }

    function openForm(type) {
        mode = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
        document.getElementById('card-' + (type==='Progressive'?'prog':type==='MiyoSmart'?'miyo':type.toLowerCase())).classList.add('active-card');
        document.getElementById('form-area').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('form-title').innerText = type + " Veri Girişi";
        
        let brands = document.getElementById('brand');
        brands.innerHTML = "";
        let list = ["Zeiss Premium", "Seiko Optical", "Hoya Vision", "Novax Freeform"];
        if(type==='MiyoSmart') list = ["Hoya MiyoSmart (Orijinal)"];
        
        list.forEach(b => { let o = document.createElement("option"); o.value = o.innerText = b; brands.appendChild(o); });
        window.scrollTo({top: document.getElementById('form-area').offsetTop - 20, behavior: 'smooth'});
    }

    function runAnalysis() {
        let max = Math.max(Math.abs(values.r_sph), Math.abs(values.r_cyl), Math.abs(values.l_sph), Math.abs(values.l_cyl));
        let res = document.getElementById('result');
        let html = `<h4 style="margin:0; color:var(--gold); text-align:center;">ZENITH TEKNİK ANALİZ</h4><hr style="border:0; border-top:1px solid #333; margin:15px 0;">`;

        if (mode === 'MiyoSmart') {
            html += `<p style="font-size:13px; text-align:center;"><b>MiyoSmart Tedavi Camı:</b> DIMS teknolojisi ile miyopi kontrolü.</p>`;
        } else {
            let ince = max <= 2.25 ? "%30" : max <= 3.25 ? "%45" : "%60 ve üzeri";
            html += `<p style="font-size:13px; text-align:center;">Önerilen Teknoloji: <b>${ince} İnceltilmiş</b> Camlar.</p>`;
        }

        html += `<div class="robot-badge">
                    <b>🤖 ZENITH ROBOTİK ODAK SİSTEMİ</b><br>
                    Verileriniz milimetrik hassasiyetle taranmış ve "Sıfır Hata" odak noktasıyla üretime hazır hale getirilmiştir.
                 </div>`;

        html += `<button class="btn" style="background:#25d366; color:#fff;" onclick="send()">WHATSAPP İLE SİPARİŞ / RANDEVU</button>`;
        res.innerHTML = html;
        res.style.display = 'block';
        setTimeout(() => { res.scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    function send() {
        let msg = `*ATLANTİS ELEGANCE OPTİK*%0A%0A` +
                  `*Kategori:* ${mode}%0A` +
                  `*Marka:* ${document.getElementById('brand').value}%0A` +
                  `*SAĞ:* ${document.getElementById('r_sph_val').innerText} / ${document.getElementById('r_cyl_val').innerText} Ax: ${values.r_aks}%0A` +
                  `*SOL:* ${document.getElementById('l_sph_val').innerText} / ${document.getElementById('l_cyl_val').innerText} Ax: ${values.l_aks}%0A%0A` +
                  `Zenith Robotik sıfır hata odaklama randevusu istiyorum.`;
        window.location.href = `https://wa.me/905326470159?text=${msg}`;
    }
</script>

</body>
</html>
