<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Elegance Optik - Profesyonel Analiz</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #121212; --cyan: #00f2ff; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        /* Logo & Header */
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .subtitle { font-size: 10px; color: #666; letter-spacing: 4px; margin-top: 5px; }

        /* Ana Sayfa Şık Kartlar */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #333; border-radius: 15px; padding: 20px 10px; 
            cursor: pointer; transition: 0.3s; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card.active-card { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.15); }
        .card h3 { margin: 0; color: var(--gold); font-size: 14px; letter-spacing: 1px; }
        .card p { margin: 5px 0 0 0; color: #777; font-size: 10px; font-weight: 300; }

        /* Kolay Numara Girişi (Yaşlı Dostu) */
        .input-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .input-label { font-size: 12px; color: var(--gold); font-weight: bold; width: 40px; }
        .step-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .step-btn:active { background: var(--gold); color: #000; }
        .num-display { font-size: 18px; font-weight: bold; width: 80px; text-align: center; color: #fff; }

        /* Form Alanı */
        #form-area { display: none; background: var(--gray); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 10px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; }
        .btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; font-size: 16px; box-shadow: 0 5px 15px rgba(212,175,55,0.2); }
        
        /* Sonuç Paneli */
        .result-box { display: none; margin-top: 25px; padding: 20px; border: 1px solid var(--gold); border-radius: 15px; background: rgba(212, 175, 55, 0.05); }
        .robot-badge { margin-top: 15px; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan); color: var(--cyan); font-size: 12px; line-height: 1.5; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">ATLANTİS ELEGANCE OPTİK</h1>
        <div class="subtitle">AI & TECHNOLOGY SYSTEMS</div>
    </div>

    <div class="card-grid">
        <div class="card" id="card-stok" onclick="openForm('Stok')">
            <h3>📦 STOK</h3>
            <p>Hızlı Çözümler</p>
        </div>
        <div class="card" id="card-rx" onclick="openForm('RX')">
            <h3>💎 ÖZEL RX</h3>
            <p>Premium Üretim</p>
        </div>
        <div class="card" id="card-prog" onclick="openForm('Progressive')">
            <h3>👓 UZAK-YAKIN</h3>
            <p>Prografil Çözümler</p>
        </div>
        <div class="card" id="card-miyo" onclick="openForm('MiyoSmart')">
            <h3>🛡️ MIYOSMART</h3>
            <p>Çocuk Göz Sağlığı</p>
        </div>
    </div>

    <div id="form-area">
        <h4 id="form-title" style="color:var(--gold); margin-bottom:15px; text-align:center;">Analiz Başlıyor</h4>
        
        <label style="font-size:10px; color:#666;">Cam Markası Seçimi:</label>
        <select id="brand"></select>

        <p style="color:var(--gold); font-size:12px; margin-bottom:10px; font-weight:bold; border-bottom:1px solid #333;">SAĞ GÖZ (R)</p>
        <div class="input-row">
            <span class="input-label">SPH</span>
            <button class="step-btn" onclick="step('r_sph', -0.25)">-</button>
            <div id="r_sph_val" class="num-display">0.00</div>
            <button class="step-btn" onclick="step('r_sph', 0.25)">+</button>
        </div>
        <div class="input-row">
            <span class="input-label">CYL</span>
            <button class="step-btn" onclick="step('r_cyl', -0.25)">-</button>
            <div id="r_cyl_val" class="num-display">0.00</div>
            <button class="step-btn" onclick="step('r_cyl', 0.25)">+</button>
        </div>

        <p style="color:var(--gold); font-size:12px; margin:20px 0 10px 0; font-weight:bold; border-bottom:1px solid #333;">SOL GÖZ (L)</p>
        <div class="input-row">
            <span class="input-label">SPH</span>
            <button class="step-btn" onclick="step('l_sph', -0.25)">-</button>
            <div id="l_sph_val" class="num-display">0.00</div>
            <button class="step-btn" onclick="step('l_sph', 0.25)">+</button>
        </div>
        <div class="input-row">
            <span class="input-label">CYL</span>
            <button class="step-btn" onclick="step('l_cyl', -0.25)">-</button>
            <div id="l_cyl_val" class="num-display">0.00</div>
            <button class="step-btn" onclick="step('l_cyl', 0.25)">+</button>
        </div>

        <button class="btn" onclick="runAnalysis()">TEKNOLOJİK ANALİZİ GÖR</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    // Numaraları tutan obje
    let values = { r_sph: 0, r_cyl: 0, l_sph: 0, l_cyl: 0 };
    let mode = "";

    function step(id, amount) {
        values[id] += amount;
        let displayVal = values[id].toFixed(2);
        if (values[id] > 0) displayVal = "+" + displayVal;
        document.getElementById(id + '_val').innerText = displayVal;
    }

    function openForm(type) {
        mode = type;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
        document.getElementById('card-' + (type==='Progressive'?'prog':type==='MiyoSmart'?'miyo':type.toLowerCase())).classList.add('active-card');
        document.getElementById('form-area').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('form-title').innerText = type + " Veri Girişi";
        
        let list = type === 'Stok' ? ["Standart Stok", "Mavi Işık Korumalı"] : 
                   type === 'Progressive' ? ["Zeiss SmartLife Pro", "Varilux X Series", "Seiko Brilliance"] :
                   type === 'MiyoSmart' ? ["Hoya MiyoSmart (Miyopi Kontrol)"] : ["Zeiss RX", "Seiko RX", "Hoya RX"];
        
        let brands = document.getElementById('brand');
        brands.innerHTML = "";
        list.forEach(b => { let o = document.createElement("option"); o.value = o.innerText = b; brands.appendChild(o); });
        
        window.scrollTo({top: document.getElementById('form-area').offsetTop - 20, behavior: 'smooth'});
    }

    function runAnalysis() {
        let max = Math.max(Math.abs(values.r_sph), Math.abs(values.r_cyl), Math.abs(values.l_sph), Math.abs(values.l_cyl));
        let res = document.getElementById('result');
        let html = `<h4 style="margin:0; color:var(--gold); text-align:center;">ZENITH TEKNİK RAPORU</h4><hr style="border:0; border-top:1px solid #333; margin:15px 0;">`;

        if (mode === 'MiyoSmart') {
            html += `<p style="font-size:13px; text-align:center;"><b>MiyoSmart Tedavi Sistemi:</b> Çocuklarda miyopi ilerlemesini yavaşlatmak için DIMS teknolojisi kullanılacaktır.</p>`;
        } else if (mode === 'Progressive') {
            html += `<p style="font-size:13px; text-align:center;"><b>Uzak-Yakın Hibrit Tasarım:</b> Tek camda kesintisiz görüş. Zenith robotik ölçümle odak kayması riski elimine edilir.</p>`;
        } else {
            let ince = max <= 2.25 ? "%30" : max <= 3.25 ? "%45" : "%60 ve üzeri";
            html += `<p style="font-size:13px; text-align:center;">Verilerinize göre <b>${ince} inceltilmiş</b> cam teknolojisi estetik açıdan en iyi sonucu verir.</p>`;
        }

        html += `<div class="robot-badge">
                    <b>🤖 ZENITH ROBOTİK ODAK NOKTASI</b><br>
                    Dijital parametrelerinizle sıfır hata odaklama ve milimetrik hassasiyetle üretim sürecine alınacaktır.
                 </div>`;

        html += `<button class="btn" style="background:#25d366; color:#fff;" onclick="send()">WHATSAPP İLE RANDEVU AL</button>`;
        res.innerHTML = html;
        res.style.display = 'block';

        // Sayfayı sonuç kısmına kaydır (Senin istediğin özellik)
        setTimeout(() => {
            res.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    function send() {
        let msg = `*ATLANTİS ELEGANCE OPTİK*%0A%0A` +
                  `*Kategori:* ${mode}%0A` +
                  `*Cam:* ${document.getElementById('brand').value}%0A` +
                  `*SAĞ:* ${document.getElementById('r_sph_val').innerText} / ${document.getElementById('r_cyl_val').innerText}%0A` +
                  `*SOL:* ${document.getElementById('l_sph_val').innerText} / ${document.getElementById('l_cyl_val').innerText}%0A%0A` +
                  `Zenith Robotik sıfır hata odaklama randevusu istiyorum.`;
        window.location.href = `https://wa.me/905326470159?text=${msg}`;
    }
</script>

</body>
</html>
